# OpenEvolve configuration for Router optimization
# Usage:
#   export OPENAI_API_KEY="your-gemini-api-key"
#   python -m openevolve openevolve_program.py openevolve_evaluator.py --config openevolve_config.yaml

max_iterations: 80
checkpoint_interval: 5
log_level: INFO
random_seed: 42

# LLM configuration
llm:
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  temperature: 1.0
  max_tokens: 4096
  timeout: 120
  retries: 3
  models:
    - name: "gemini-2.5-flash"
      weight: 1.0

# Population: MAP-Elites with 2 islands
database:
  population_size: 15
  num_islands: 2
  migration_interval: 5
  migration_rate: 0.15
  feature_dimensions: ["score", "complexity"]
  feature_bins: 5

# Evaluator: each eval ~2-3 min (no LLM inference, just BERT training)
evaluator:
  timeout: 600  # 10 min max per evaluation
  enable_artifacts: true
  cascade_evaluation: false  # no need for cascade, evals are fast
  max_tasks_per_child: 1  # force spawn to avoid CUDA fork issues

# Evolution strategy
diff_based_evolution: true
max_code_length: 8000

# System message to guide LLM mutations
system_message: |
  You are optimizing a query router for MPC-private LLM inference.
  Goal: maximize score = routed_F1 - 10 * weighted_MPC_cost. Higher is better.
  Current best score: ~45.6 (F1=54.73, cost=0.906x) using ["1b_mpcache","3b_mpcache","8b_mpcache"].

  Available models for the pool (pick 2+ for model_keys):
    1b           cost=0.222x   F1=38.18
    qwen1.5b     cost=0.255x   F1=44.11   (Qwen family, different strengths)
    3b           cost=0.523x   F1=49.94
    8b           cost=1.107x   F1=55.05
    1b_mpcache   cost=0.152x   F1=37.42   (compressed 1B)
    3b_mpcache   cost=0.392x   F1=49.21   (compressed 3B)
    8b_mpcache   cost=0.909x   F1=54.71   (compressed 8B)

  CRITICAL: Be AGGRESSIVE and CREATIVE. Do NOT just tweak qt or lr. Try RADICALLY different configs:

  1. **Wild pool combinations** - try 4-5 model pools:
     ["1b_mpcache","qwen1.5b","3b_mpcache","8b_mpcache"]
     ["qwen1.5b","3b","8b_mpcache"]
     ["1b","qwen1.5b","3b_mpcache","8b"]
     ["1b_mpcache","3b","8b"]
     Mix compressed and uncompressed models freely!

  2. **Different label strategies** - MUST try at least one of:
     - label_type="soft_binary" + loss_type="bce" + soft_label_threshold=0.3-0.7 + soft_label_temperature=2-10
     - label_type="ranking" + loss_type="margin_ranking"
     - loss_type="weighted_mse" with cost_penalty_lambda=0.1-0.5

  3. **Different router architectures**:
     "prajjwal1/bert-mini" (4 layers, 256 hidden, more capacity)
     "prajjwal1/bert-small" (4 layers, 512 hidden)

  4. **Extreme quality_threshold values**: try 0.5, 0.6, 0.7 for aggressive cost saving

  5. **Training**: try lr=5e-5 or 1e-4 for faster convergence, epochs=30 for more training

  Do NOT repeat configs that are similar to previous attempts. Each mutation should change at least 2 parameters significantly.
